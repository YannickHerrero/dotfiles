# herdr configuration

[keys]
prefix = "ctrl+a"
split_vertical = "prefix+|"
split_horizontal = "prefix+minus"
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"
toggle_sidebar = "ctrl+b"

[[keys.command]]
key = "prefix+j"
type = "pane"
command = "~/.config/herdr/sessionizer.sh"
description = "Herdr space sessionizer"

[theme]
name = "terminal"
auto_switch = false
